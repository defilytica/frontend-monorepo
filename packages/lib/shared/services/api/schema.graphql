enum GqlPoolType {
  COMPOSABLE_STABLE
  COW_AMM
  ELEMENT
  FIXED_LBP
  FX
  GYRO
  GYRO3
  GYROE
  INVESTMENT
  LIQUIDITY_BOOTSTRAPPING
  META_STABLE
  PHANTOM_STABLE
  QUANT_AMM_WEIGHTED
  RECLAMM
  STABLE
  UNKNOWN
  WEIGHTED
